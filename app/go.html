<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Beacon — Go Live</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#00b4b4">
    <link rel="icon" href="/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #preview {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
        }
        .overlay {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
            padding: 20px;
        }
        #title-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            padding: 12px 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            outline: none;
        }
        #title-input::placeholder { color: rgba(255,255,255,0.4); }
        #go-btn {
            width: 220px;
            height: 120px;
            border-radius: 24px;
            border: none;
            font-size: 32px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
        }
        #go-btn.ready {
            background: #00b4b4;
            color: #fff;
            box-shadow: 0 0 40px rgba(0,180,180,0.3);
        }
        #go-btn.ready:active { transform: scale(0.96); }
        #go-btn.live {
            background: #e03030;
            color: #fff;
            box-shadow: 0 0 40px rgba(224,48,48,0.4);
        }
        #camera-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        #camera-toggle:active { background: rgba(255,255,255,0.3); }
        .status {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
        }
        .status.active { display: flex; }
        .status .dot {
            width: 12px; height: 12px;
            background: #e03030;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #share-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        #share-section.active { display: flex; }
        #share-link {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            color: #ccc;
            word-break: break-all;
            max-width: 320px;
            text-align: center;
        }
        #copy-btn {
            background: #00b4b4;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-height: 48px;
        }
        #copy-btn:active { opacity: 0.8; }
        #qr-canvas { border-radius: 8px; }
        #error-msg {
            display: none;
            background: rgba(224,48,48,0.2);
            border: 1px solid rgba(224,48,48,0.4);
            border-radius: 8px;
            padding: 12px 20px;
            color: #ff8080;
            font-size: 14px;
            max-width: 340px;
            text-align: center;
        }
        #error-msg.active { display: block; }
        #yt-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        #yt-section.active { display: flex; }
        #yt-toggle {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #999;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            min-height: 44px;
        }
        #yt-toggle:active { opacity: 0.8; }
        #yt-toggle.on {
            background: rgba(224,48,48,0.12);
            border-color: rgba(224,48,48,0.4);
            color: #ff6666;
        }
        #yt-toggle .yt-dot {
            width: 8px; height: 8px;
            background: #e03030;
            border-radius: 50%;
            display: none;
            animation: pulse 1.5s ease-in-out infinite;
        }
        #yt-toggle.on .yt-dot { display: inline-block; }
    </style>
</head>
<body>
    <video id="preview" autoplay playsinline muted></video>

    <button id="camera-toggle" title="Switch camera">&#x21A9;</button>

    <div class="overlay">
        <div id="status" class="status">
            <span class="dot"></span>
            <span>LIVE</span>
        </div>

        <input id="title-input" type="text" placeholder="Stream title (optional)" maxlength="80">

        <button id="go-btn" class="ready">GO LIVE</button>

        <div id="error-msg"></div>

        <div id="yt-section">
            <button id="yt-toggle">
                <span class="yt-dot"></span>
                <span id="yt-label">YouTube</span>
            </button>
        </div>

        <div id="share-section">
            <div id="share-link"></div>
            <button id="copy-btn">Copy Share Link</button>
            <canvas id="qr-canvas"></canvas>
        </div>
    </div>

    <script>
        const DOMAIN = location.hostname;
        const WHIP_URL = `${location.protocol}//${DOMAIN}/live/whip`;

        const preview = document.getElementById('preview');
        const goBtn = document.getElementById('go-btn');
        const cameraToggle = document.getElementById('camera-toggle');
        const statusEl = document.getElementById('status');
        const shareSection = document.getElementById('share-section');
        const shareLinkEl = document.getElementById('share-link');
        const copyBtn = document.getElementById('copy-btn');
        const qrCanvas = document.getElementById('qr-canvas');
        const errorMsg = document.getElementById('error-msg');
        const titleInput = document.getElementById('title-input');
        const ytSection = document.getElementById('yt-section');
        const ytToggle = document.getElementById('yt-toggle');
        const ytLabel = document.getElementById('yt-label');

        let stream = null;
        let pc = null;
        let isLive = false;
        let facingMode = 'environment';
        let whipResourceURL = null;
        let ytActive = false;

        // Pre-fill title with date/time
        const now = new Date();
        titleInput.value = now.toLocaleDateString('en-US', {
            month: 'short', day: 'numeric', year: 'numeric',
            hour: 'numeric', minute: '2-digit'
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('active');
            setTimeout(() => errorMsg.classList.remove('active'), 6000);
        }

        function updateYTButton() {
            if (ytActive) {
                ytToggle.classList.add('on');
                ytLabel.textContent = 'YouTube Live';
            } else {
                ytToggle.classList.remove('on');
                ytLabel.textContent = 'YouTube';
            }
        }

        async function checkYouTubeRelay() {
            try {
                const resp = await fetch('/api/youtube/status');
                const data = await resp.json();
                ytActive = data.active;
                updateYTButton();
                if (data.configured && isLive) {
                    ytSection.classList.add('active');
                }
            } catch (e) { /* relay service unavailable */ }
        }

        async function getCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    },
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                preview.srcObject = stream;
                preview.style.display = 'block';
            } catch (err) {
                // Fall back to 480p
                try {
                    const fallback = {
                        video: {
                            facingMode: facingMode,
                            width: { ideal: 854 },
                            height: { ideal: 480 },
                            frameRate: { ideal: 30 }
                        },
                        audio: true
                    };
                    stream = await navigator.mediaDevices.getUserMedia(fallback);
                    preview.srcObject = stream;
                    preview.style.display = 'block';
                } catch (err2) {
                    showError("Can't access camera or microphone. Please allow permissions and try again.");
                    throw err2;
                }
            }
        }

        async function startWHIP() {
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            stream.getTracks().forEach(track => pc.addTrack(track, stream));

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // Wait for ICE gathering to complete (or timeout)
            await new Promise((resolve) => {
                if (pc.iceGatheringState === 'complete') return resolve();
                const onStateChange = () => {
                    if (pc.iceGatheringState === 'complete') {
                        pc.removeEventListener('icegatheringstatechange', onStateChange);
                        resolve();
                    }
                };
                pc.addEventListener('icegatheringstatechange', onStateChange);
                setTimeout(resolve, 5000);
            });

            const resp = await fetch(WHIP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/sdp' },
                body: pc.localDescription.sdp
            });

            if (!resp.ok) {
                throw new Error(`WHIP failed: ${resp.status}`);
            }

            // Store WHIP resource URL for clean teardown via DELETE
            const locationHeader = resp.headers.get('Location');
            if (locationHeader) {
                whipResourceURL = locationHeader.startsWith('http')
                    ? locationHeader
                    : `${location.protocol}//${DOMAIN}${locationHeader}`;
            }

            const answerSDP = await resp.text();
            await pc.setRemoteDescription({ type: 'answer', sdp: answerSDP });
        }

        async function stopStream() {
            // Stop YouTube relay if active
            if (ytActive) {
                fetch('/api/youtube/stop', { method: 'POST' }).catch(() => {});
                ytActive = false;
                updateYTButton();
            }
            ytSection.classList.remove('active');

            // Send WHIP DELETE to cleanly end the session on the server
            if (whipResourceURL) {
                try {
                    await fetch(whipResourceURL, { method: 'DELETE' });
                } catch (e) {
                    // Best effort — server will clean up on disconnect anyway
                }
                whipResourceURL = null;
            }
            if (pc) {
                pc.close();
                pc = null;
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            preview.style.display = 'none';
            preview.srcObject = null;
            isLive = false;
            goBtn.textContent = 'GO LIVE';
            goBtn.className = 'ready';
            statusEl.classList.remove('active');
            shareSection.classList.remove('active');
        }

        goBtn.addEventListener('click', async () => {
            if (isLive) {
                stopStream();
                return;
            }

            goBtn.textContent = '...';
            goBtn.disabled = true;

            try {
                await getCamera();
                await startWHIP();

                isLive = true;
                goBtn.textContent = 'STOP';
                goBtn.className = 'live';
                goBtn.disabled = false;
                statusEl.classList.add('active');

                // Show YouTube toggle if configured
                checkYouTubeRelay();

                // Build share link
                const title = encodeURIComponent(titleInput.value || '');
                const watchURL = `${location.protocol}//${DOMAIN}/watch.html?title=${title}`;
                shareLinkEl.textContent = watchURL;
                shareSection.classList.add('active');

                // Generate QR code
                QRCode.toCanvas(qrCanvas, watchURL, {
                    width: 160,
                    margin: 2,
                    color: { dark: '#ffffff', light: '#0a0a0a' }
                });

            } catch (err) {
                console.error('Stream start failed:', err);
                showError("Can't reach stream server — are you online?");
                stopStream();
                goBtn.textContent = 'GO LIVE';
                goBtn.disabled = false;
            }
        });

        cameraToggle.addEventListener('click', async () => {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            if (stream) {
                stream.getVideoTracks().forEach(t => t.stop());
                try {
                    const newStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false
                    });
                    const newVideoTrack = newStream.getVideoTracks()[0];
                    const oldVideoTrack = stream.getVideoTracks()[0];
                    if (oldVideoTrack) stream.removeTrack(oldVideoTrack);
                    stream.addTrack(newVideoTrack);
                    preview.srcObject = stream;

                    // Replace track in peer connection via replaceTrack() — no stream restart
                    if (pc && isLive) {
                        const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) await sender.replaceTrack(newVideoTrack);
                    }
                } catch (err) {
                    showError("Can't switch camera.");
                }
            }
        });

        ytToggle.addEventListener('click', async () => {
            ytToggle.disabled = true;
            try {
                const endpoint = ytActive ? '/api/youtube/stop' : '/api/youtube/start';
                const resp = await fetch(endpoint, { method: 'POST' });
                const data = await resp.json();
                if (data.error) {
                    showError(data.error);
                } else {
                    ytActive = data.active;
                    updateYTButton();
                }
            } catch (e) {
                showError("Can't reach YouTube relay.");
            }
            ytToggle.disabled = false;
        });

        copyBtn.addEventListener('click', () => {
            const url = shareLinkEl.textContent;
            navigator.clipboard.writeText(url).then(() => {
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy Share Link'; }, 2000);
            });
        });
    </script>
</body>
</html>
