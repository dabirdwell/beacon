<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Beacon — Watch</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" href="/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #video-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 2;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .badge.live {
            background: #e03030;
            color: #fff;
        }
        .badge.offline {
            background: rgba(255,255,255,0.15);
            color: #999;
        }
        .badge .dot {
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #stream-title {
            font-size: 14px;
            color: #ccc;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #share-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        #share-btn:active { background: rgba(255,255,255,0.3); }
        #unmute-btn {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(0,180,180,0.9);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        #unmute-btn:active { opacity: 0.8; }
        #unmute-btn.hidden { display: none; }
        .waiting {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #888;
            font-size: 16px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00b4b4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ended {
            color: #888;
            font-size: 18px;
            text-align: center;
        }
        .bottom-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            z-index: 2;
            font-size: 13px;
            color: #ccc;
            pointer-events: none;
        }
        .bottom-bar .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .conn-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .conn-dot.on { background: #30d060; }
        .conn-dot.off { background: #e03030; }
    </style>
</head>
<body>
    <div id="video-container">
        <div class="top-bar">
            <div style="display:flex; align-items:center; gap:10px;">
                <span id="live-badge" class="badge offline">OFFLINE</span>
                <span id="stream-title"></span>
            </div>
            <button id="share-btn">Share</button>
        </div>

        <video id="player" playsinline></video>

        <button id="unmute-btn" class="hidden">Tap to Unmute</button>

        <div id="waiting" class="waiting" style="display:none;">
            <div class="spinner"></div>
            <span>Waiting for stream...</span>
        </div>

        <div id="ended" class="ended" style="display:none;">
            Stream ended
        </div>

        <div class="bottom-bar" id="bottom-bar" style="display:none;">
            <div class="stat"><span class="conn-dot off" id="conn-dot"></span><span id="conn-label">Disconnected</span></div>
            <div class="stat" id="uptime-stat" style="display:none;">&#x23F1; <span id="uptime">0:00</span></div>
            <div class="stat" id="viewers-stat" style="display:none;">&#x1F441; <span id="viewer-count">1</span></div>
        </div>
    </div>

    <script>
        const DOMAIN = location.hostname;
        const HLS_URL = `${location.protocol}//${DOMAIN}/live/index.m3u8`;

        const video = document.getElementById('player');
        const liveBadge = document.getElementById('live-badge');
        const titleEl = document.getElementById('stream-title');
        const shareBtn = document.getElementById('share-btn');
        const unmuteBtn = document.getElementById('unmute-btn');
        const waitingEl = document.getElementById('waiting');
        const endedEl = document.getElementById('ended');

        // Parse title from URL
        const params = new URLSearchParams(location.search);
        const title = params.get('title');
        if (title) {
            titleEl.textContent = decodeURIComponent(title);
            document.title = `Beacon — ${decodeURIComponent(title)}`;
        }

        const bottomBar = document.getElementById('bottom-bar');
        const connDot = document.getElementById('conn-dot');
        const connLabel = document.getElementById('conn-label');
        const uptimeStat = document.getElementById('uptime-stat');
        const uptimeEl = document.getElementById('uptime');
        const viewersStat = document.getElementById('viewers-stat');

        let hls = null;
        let pollTimer = null;
        let wasLive = false;
        let liveStartTime = null;
        let uptimeTimer = null;

        function formatDuration(ms) {
            const s = Math.floor(ms / 1000);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            return `${m}:${String(sec).padStart(2,'0')}`;
        }

        function startUptime() {
            liveStartTime = Date.now();
            uptimeTimer = setInterval(() => {
                uptimeEl.textContent = formatDuration(Date.now() - liveStartTime);
            }, 1000);
        }

        function stopUptime() {
            if (uptimeTimer) { clearInterval(uptimeTimer); uptimeTimer = null; }
            liveStartTime = null;
        }

        function setLive() {
            liveBadge.className = 'badge live';
            liveBadge.innerHTML = '<span class="dot"></span> LIVE';
            waitingEl.style.display = 'none';
            endedEl.style.display = 'none';
            video.style.display = 'block';
            wasLive = true;
            // Bottom bar
            bottomBar.style.display = 'flex';
            connDot.className = 'conn-dot on';
            connLabel.textContent = 'Connected';
            uptimeStat.style.display = 'flex';
            viewersStat.style.display = 'flex';
            if (!liveStartTime) startUptime();
        }

        function setWaiting() {
            liveBadge.className = 'badge offline';
            liveBadge.textContent = 'OFFLINE';
            video.style.display = 'none';
            stopUptime();
            if (wasLive) {
                endedEl.style.display = 'flex';
                waitingEl.style.display = 'none';
                bottomBar.style.display = 'flex';
                connDot.className = 'conn-dot off';
                connLabel.textContent = 'Disconnected';
                uptimeStat.style.display = 'none';
                viewersStat.style.display = 'none';
            } else {
                waitingEl.style.display = 'flex';
                endedEl.style.display = 'none';
                bottomBar.style.display = 'flex';
                connDot.className = 'conn-dot off';
                connLabel.textContent = 'Waiting';
                uptimeStat.style.display = 'none';
                viewersStat.style.display = 'none';
            }
        }

        function tryPlay() {
            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    liveSyncDurationCount: 3
                });

                hls.loadSource(HLS_URL);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    setLive();
                    video.muted = true;
                    video.play().then(() => {
                        unmuteBtn.classList.remove('hidden');
                    }).catch(() => {});
                    stopPolling();
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        hls.destroy();
                        hls = null;
                        setWaiting();
                        startPolling();
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS (Safari)
                video.src = HLS_URL;
                video.addEventListener('loadedmetadata', () => {
                    setLive();
                    video.muted = true;
                    video.play().then(() => {
                        unmuteBtn.classList.remove('hidden');
                    }).catch(() => {});
                    stopPolling();
                });
                video.addEventListener('error', () => {
                    setWaiting();
                    startPolling();
                });
            }
        }

        function startPolling() {
            if (pollTimer) return;
            pollTimer = setInterval(() => {
                tryPlay();
            }, 5000);
        }

        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        // Unmute
        unmuteBtn.addEventListener('click', () => {
            video.muted = false;
            unmuteBtn.classList.add('hidden');
        });

        // Share
        shareBtn.addEventListener('click', () => {
            const url = location.href;
            if (navigator.share) {
                navigator.share({ title: 'Beacon Stream', url: url });
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    shareBtn.textContent = 'Copied!';
                    setTimeout(() => { shareBtn.textContent = 'Share'; }, 2000);
                });
            }
        });

        // Start
        setWaiting();
        tryPlay();
        startPolling();
    </script>
</body>
</html>
