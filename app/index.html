<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon — One-Button Civic Live Streaming</title>
    <meta name="description" content="Self-hosted, one-button live streaming for civic journalism and community accountability.">
    <link rel="icon" href="/icon.png">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a { color: #00b4b4; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px 40px;
            text-align: center;
        }
        .beacon-mark {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: #00b4b4;
            margin-bottom: 24px;
            box-shadow: 0 0 60px rgba(0, 180, 180, 0.25);
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 1.15rem;
            color: #999;
            margin-bottom: 40px;
        }

        /* Live stream section */
        #stream-section {
            display: none;
            width: 100%;
            max-width: 720px;
            margin-bottom: 32px;
        }
        #stream-section.active { display: block; }
        #stream-section video {
            width: 100%;
            border-radius: 12px;
            background: #111;
            aspect-ratio: 16/9;
        }
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(224, 48, 48, 0.15);
            border: 1px solid rgba(224, 48, 48, 0.3);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff6060;
            margin-bottom: 16px;
        }
        .live-badge .dot {
            width: 8px; height: 8px;
            background: #e03030;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Offline message */
        #offline-msg {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 32px 24px;
            max-width: 480px;
            margin-bottom: 32px;
            color: #777;
            font-size: 1rem;
        }

        /* Start streaming section */
        .start-section {
            max-width: 480px;
            width: 100%;
        }
        .start-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 12px;
        }
        .start-btn {
            display: inline-block;
            background: #00b4b4;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .start-btn:hover { opacity: 0.85; text-decoration: none; }
        .start-hint {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #555;
        }

        footer {
            text-align: center;
            padding: 32px 24px;
            font-size: 0.8rem;
            color: #444;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        footer a { color: #666; }
    </style>
</head>
<body>

<div class="hero">
    <div class="beacon-mark"></div>
    <h1>Beacon</h1>
    <p class="tagline">One-Button Civic Live Streaming</p>

    <!-- Live stream (shown when active) -->
    <div id="stream-section">
        <div class="live-badge"><span class="dot"></span> LIVE</div>
        <video id="live-player" controls autoplay muted playsinline></video>
    </div>

    <!-- Offline message (shown when no stream) -->
    <div id="offline-msg">
        No active stream. Check back soon.
    </div>

    <!-- Start streaming -->
    <div class="start-section">
        <h2>Start Streaming</h2>
        <a href="/go.html" class="start-btn">Open Streamer</a>
        <p class="start-hint">Opens the broadcast PWA — works on any phone with a camera.</p>
    </div>
</div>

<footer>
    Built by <a href="https://humanityandai.com">Humanity &amp; AI</a> &nbsp;|&nbsp;
    Open Source &nbsp;|&nbsp;
    <a href="https://github.com/humanityandai/beacon">MIT License</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
    const HLS_URL = `${location.protocol}//${location.hostname}/live/stream/index.m3u8`;
    const STATUS_URL = `${location.protocol}//${location.hostname}/live/`;
    const streamSection = document.getElementById('stream-section');
    const offlineMsg = document.getElementById('offline-msg');
    const video = document.getElementById('live-player');

    function showStream() {
        offlineMsg.style.display = 'none';
        streamSection.classList.add('active');
        if (Hls.isSupported()) {
            const hls = new Hls({ liveSyncDurationCount: 3 });
            hls.loadSource(HLS_URL);
            hls.attachMedia(video);
            hls.on(Hls.Events.ERROR, () => {
                // Stream ended or errored — revert to offline
                hls.destroy();
                hideStream();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = HLS_URL;
        }
    }

    function hideStream() {
        streamSection.classList.remove('active');
        offlineMsg.style.display = 'block';
    }

    // Check for active stream by probing the HLS manifest
    async function checkStream() {
        try {
            const resp = await fetch(HLS_URL, { method: 'HEAD' });
            if (resp.ok) {
                showStream();
            } else {
                hideStream();
            }
        } catch {
            hideStream();
        }
    }

    // Check on load and every 10 seconds
    checkStream();
    setInterval(checkStream, 10000);
</script>

</body>
</html>
