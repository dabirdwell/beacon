server {
    listen 80;
    server_name ${DOMAIN};

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name ${DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Streamer and viewer app
    location / {
        proxy_pass http://app:80;
    }

    # HLS stream for viewers
    location /live/ {
        proxy_pass http://mediamtx:8888/live/;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # WebRTC WHIP endpoint for streamer (POST to publish, PATCH for trickle ICE, DELETE to stop)
    location /live/whip {
        proxy_pass http://mediamtx:8889/live/whip;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # WebRTC WHEP endpoint (for WebRTC playback if needed)
    location /live/whep {
        proxy_pass http://mediamtx:8889/live/whep;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WHIP/WHEP resource endpoints (for PATCH/DELETE on session IDs)
    location ~ ^/live/whip/(.+)$ {
        proxy_pass http://mediamtx:8889/live/whip/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/live/whep/(.+)$ {
        proxy_pass http://mediamtx:8889/live/whep/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # YouTube relay toggle API
    location /api/youtube/ {
        proxy_pass http://youtube-relay:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Recording API
    location /api/recording/ {
        proxy_pass http://recorder:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Status endpoint — proxies MediaMTX path API, protected by basic auth
    location /status {
        auth_basic "Beacon Status";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://mediamtx:9997/v3/paths/list;
        add_header Content-Type application/json;
    }
}
