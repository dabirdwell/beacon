server {
    listen 8080;

    # Static app files
    location / {
        root /var/www/html;
        try_files $uri $uri/ =404;
    }

    # HLS stream for viewers
    location /live/ {
        proxy_pass http://127.0.0.1:8888/live/;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # WebRTC WHIP endpoint for streamer
    location /live/whip {
        proxy_pass http://127.0.0.1:8889/live/whip;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # WebRTC WHEP endpoint (WebRTC playback)
    location /live/whep {
        proxy_pass http://127.0.0.1:8889/live/whep;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WHIP/WHEP resource endpoints (PATCH/DELETE on session IDs)
    location ~ ^/live/whip/(.+)$ {
        proxy_pass http://127.0.0.1:8889/live/whip/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/live/whep/(.+)$ {
        proxy_pass http://127.0.0.1:8889/live/whep/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # YouTube relay toggle API
    location /api/youtube/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Status endpoint — proxies MediaMTX path API (no auth for Fly test)
    location /status {
        proxy_pass http://127.0.0.1:9997/v3/paths/list;
        add_header Content-Type application/json;
    }
}
